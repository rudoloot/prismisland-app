name: Unity Development Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_name:
        description: Explicit Android version name. Leave empty to use a CI version.
        required: false
        type: string
      version_code:
        description: Explicit positive Android version code. Leave empty to use the GitHub run number.
        required: false
        type: string
      development:
        description: Build a development APK.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: unity-development-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: Unity tests
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run EditMode tests
        shell: powershell
        run: >-
          .\Tools\Agent\Run-Tests.ps1
          -TestPlatform EditMode
          -OutputFormat Json

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unity-test-diagnostics-${{ github.run_id }}
          path: |
            Logs/
            TestResults/
          if-no-files-found: warn
          retention-days: 14

  android_build:
    name: Android development build
    needs: tests
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Android APK
        shell: powershell
        run: |
          $versionName = '${{ inputs.version_name }}'
          if ([string]::IsNullOrWhiteSpace($versionName)) {
            $versionName = "0.0.0-ci.${{ github.run_number }}"
          }

          $versionCode = '${{ inputs.version_code }}'
          if ([string]::IsNullOrWhiteSpace($versionCode)) {
            $versionCode = '${{ github.run_number }}'
          }

          $development = '${{ inputs.development }}'
          if ([string]::IsNullOrWhiteSpace($development)) {
            $development = 'true'
          }

          $buildParameters = @{
            VersionName  = $versionName
            VersionCode  = [int]$versionCode
            OutputPath   = "Builds\android\app-$versionName.apk"
            Development  = [bool]::Parse($development)
            OutputFormat = 'Json'
          }
          .\Tools\Agent\Build-Android.ps1 @buildParameters

      - name: Upload Android diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-diagnostics-${{ github.run_id }}
          path: |
            Logs/
            TestResults/
            Builds/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-apk-${{ github.run_id }}
          path: Builds/android/*.apk
          if-no-files-found: error
          retention-days: 14
